stages:
  - docker
  - lint
  - cosine-test

# Include the steps for docker and playwright
include:
  # Build the Docker image
  - component: $CI_SERVER_FQDN/2pisoftware/pipelines/docker/build@v1.3.0
    inputs:
      stage: docker
      platforms: linux/amd64,linux/arm64

  - component: $CI_SERVER_FQDN/2pisoftware/pipelines/php/lint@2.2.0
    inputs:
      ignore: "*.js,*.css,system/lib/*"

  - component: $CI_SERVER_FQDN/2pisoftware/pipelines/php/test@v2.2.0


php-lint:
  allow_failure: true

   
docker-build:
  tags:
    - largemem_x86