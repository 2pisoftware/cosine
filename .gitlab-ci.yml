stages:
  - docker
  - test

# Include the steps for docker and playwright
include:
  # Build the Docker image
  - component: $CI_SERVER_FQDN/2pisoftware/pipelines/docker/build@v1.3.0
    inputs:
      stage: docker
      platforms: linux/amd64,linux/arm64

test:
  stage: test
  services:
    - name: docker:28.4.0-dind
      # explicitly disable tls to avoid docker startup interruption
      command: ["--tls=false"]
    - name: mysql:8.0
      alias: cosine-db
      command: [ "--default-authentication-plugin=mysql_native_password" ]
  image: $CI_SERVER_FQDN/2pisoftware/cosine/cosine-tests:latest
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    MYSQL_ROOT_PASSWORD: root
    MYSQL_HOST: cosine-db
    MYSQL_USER: cosine
    MYSQL_PASSWORD: cosine
    CONNECTION_URL: mysql://cosine:cosine@cosine-db:3306
  script:
    - npm ci
    - |
      SQL_CONTAINER_ID=$(docker ps -q -f "label=com.gitlab.gitlab-runner.job.id=$CI_JOB_ID" -f "label=cosine-db")
      DOCKER_AUTH_CONFIG=$(printf '{"auths": {"%s": {"username": "%s","password": "%s"}}}' "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD")
      DOCKER_IMAGE=$DOCKER_TAG
      npx playwright test
  dependencies:
  - docker-build
  artifacts:
    when: on_failure
    paths:
      - "./test/test-results"
      - "./test/test-results/junit.xml"
    exclude:
      - "./test/test-results/composer_cache.tar"
    expire_in: 1 day
    reports:
      junit: "./test/test-results/junit.xml"
